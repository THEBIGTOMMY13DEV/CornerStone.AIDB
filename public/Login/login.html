<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cornerstone | Secure Portal</title>
  <link rel="stylesheet" href="./login-style.css">
</head>
<body>
<div id="app">
  <div class="diag-container">
    <div class="diag-visual">
      <div class="wordmark">Cornerstone AI</div>
      <div class="tagline">A secure, role-based academic ecosystem. Rebuild foundations, close knowledge gaps, and optimize your learning roadmap.</div>
    </div>

    <div class="diag-form-wrap">
      <div id="auth-login-view" class="auth-box">
        <h2 class="wordmark" style="color: var(--stone); margin-bottom: 2rem;">Welcome Back</h2>
        
        <div class="field">
          <div class="field-label">Username</div>
          <input type="text" id="login-username" placeholder="Enter your username" />
        </div>

        <div class="field">
          <div class="field-label">Password</div>
          <input type="password" id="login-password" placeholder="••••••••" style="width:100%; height:46px; padding:0 14px; border:1.5px solid var(--stone-border); border-radius:10px; font-family:var(--sans); font-size:14px; outline:none;" />
        </div>

        <button class="cta" id="login-btn" onclick="handleLogin()">Sign In →</button>
        <p class="auth-toggle-text">Don't have an account? <span onclick="toggleAuthView(true)">Create one here</span></p>
      </div>

      <div id="auth-register-view" class="auth-box" style="display: none;">
        <h2 class="wordmark" style="color: var(--stone); margin-bottom: 2rem;">Create Account</h2>
        
        <div class="field">
          <div class="field-label">Username</div>
          <input type="text" id="reg-username" placeholder="Choose a unique username" />
        </div>

        <div class="field">
          <div class="field-label">Password</div>
          <input type="password" id="reg-password" placeholder="••••••••" style="width:100%; height:46px; padding:0 14px; border:1.5px solid var(--stone-border); border-radius:10px; font-family:var(--sans); font-size:14px; outline:none;" />
        </div>

        <div class="field">
          <div class="field-label">Account Role</div>
          <select id="reg-role">
            <option value="Student">Student</option>
            <option value="Staff">Staff / Faculty</option>
          </select>
        </div>

        <button class="cta" id="register-btn" onclick="handleRegister()">Register Account →</button>
        <p class="auth-toggle-text">Already have an account? <span onclick="toggleAuthView(false)">Sign in here</span></p>
      </div>

      <div id="auth-msg" style="margin-top: 1rem; font-size: 14px; font-weight: 500; text-align: center;"></div>
    </div>
  </div>
</div>
<script src="./auth.js" defer></script>
</body>
</html>
