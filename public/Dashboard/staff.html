<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cornerstone AI | Command Center</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* A few specific tweaks for the staff table to match your theme */
    .staff-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .staff-table th { font-family: var(--outfit); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--stone-mid); padding: 12px; border-bottom: 2px solid var(--stone-border); text-align: left; }
    .staff-table td { padding: 16px 12px; border-bottom: 1px solid var(--stone-border); font-size: 15px; color: var(--stone); }
    .staff-table tr:hover td { background-color: var(--stone-light); }
  </style>
</head>
<body>

  <div id="app" style="max-width: 900px;"> <div class="roadmap-header" style="display: flex; justify-content: space-between; align-items: center;">
      <div class="student-banner" style="margin-bottom: 0;">
        <div>
          <div class="student-name">Command Center</div>
          <div class="student-meta" id="welcomeMessage">Authenticating...</div>
        </div>
      </div>
      <button class="back-btn" id="logoutBtn" style="margin-bottom: 0; background: var(--coral-bg); color: var(--coral-dark); border-color: var(--coral-mid);">Log Out ⎋</button>
    </div>

    <div class="roadmap-content">
      <div class="section-header"><span>Student Roster & Assigned Tracks</span><div class="section-line"></div></div>
      
      <div style="overflow-x: auto;">
        <table class="staff-table">
          <thead>
            <tr>
              <th>Student Username</th>
              <th>Curriculum Roadmap</th>
            </tr>
          </thead>
          <tbody id="studentTableBody">
            <tr>
              <td colspan="2" style="text-align: center; color: var(--stone-mid);">Loading secure student data...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script>
    // --- 1. SECURITY & WELCOME ---
    const currentUser = localStorage.getItem('username');
    if (!currentUser) {
      window.location.href = "index.html"; 
    } else {
      document.getElementById('welcomeMessage').textContent = `Active Session: ${currentUser}`;
    }

    // --- 2. LOGOUT LOGIC ---
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.clear(); 
      window.location.href = "index.html"; 
    });

    // --- 3. FETCH STUDENT DATA ---
    async function loadStudents() {
      const tableBody = document.getElementById('studentTableBody');
      
      try {
        const response = await fetch('/api/students');
        const students = await response.json();

        tableBody.innerHTML = '';

        if (students.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: var(--stone-mid);">No students found in the database.</td></tr>';
          return;
        }

        students.forEach(student => {
          const row = document.createElement('tr');
          
          let trackDisplay = "Pending Diagnostic";
          let badgeClass = "badge"; // default gray

          // Assign your custom badge colors based on the data
          if (student.roadmap_track) {
            trackDisplay = student.roadmap_track;
            if (trackDisplay.includes("Foundation")) badgeClass = "badge badge-coral";
            else if (trackDisplay.includes("Gaps")) badgeClass = "badge badge-amber";
            else if (trackDisplay.includes("Polishing")) badgeClass = "badge badge-teal";
            else badgeClass = "badge badge-purple"; // fallback for the old tracks
          }

          row.innerHTML = `
            <td style="font-weight: 600;">${student.username}</td>
            <td><span class="${badgeClass}">${trackDisplay}</span></td>
          `;
          tableBody.appendChild(row);
        });

      } catch (error) {
        console.error("Error fetching students:", error);
        tableBody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: var(--coral-mid);">Failed to load data. Is the server running?</td></tr>';
      }
    }

    loadStudents();
  </script>
</body>
</html>
